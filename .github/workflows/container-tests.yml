name: Container Tests

# Runs the Testcontainers smoke test that builds the proxy/agent images from
# etc/docker/*.df and verifies the full Prometheus -> proxy -> agent -> endpoint
# scrape path. Slow (~1-2 min) so this is gated behind targeted triggers
# rather than running on every PR. No untrusted event payloads are referenced.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    paths:
      - 'etc/docker/**'
      - 'build.gradle.kts'
      - 'gradle/libs.versions.toml'
      - 'src/shadow/**'
      - 'src/test/kotlin/io/prometheus/containers/**'
      - 'src/test/resources/containers/**'
      - '.github/workflows/container-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5

      - name: Build agent and proxy fat JARs
        run: ./gradlew agentJar proxyJar

      - name: Run Testcontainers smoke test
        env:
          RUN_CONTAINER_TESTS: 'true'
        run: ./gradlew test --tests "io.prometheus.containers.*"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-test-reports
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7
