name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Set HARNESS_CONFIG at the job level so every Gradle invocation observes the same value.
    # The build script propagates this into the `test` task's environment, making it part of
    # the task inputs; if it varied between steps Gradle would consider `:test` out-of-date and
    # re-run the suite under the default (MEDIUM) config when koverXmlReport executes.
    env:
      HARNESS_CONFIG: MINI
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v5

      - name: Compile (no tests)
        run: ./gradlew clean build -xtest

      - name: Lint
        run: ./gradlew lintKotlinMain lintKotlinTest

      # --continue lets the kover report tasks run even if some tests fail, preserving the
      # prior behavior where coverage was still uploaded on test failure.
      - name: Run tests and generate coverage report
        run: ./gradlew --continue test koverXmlReport koverLog

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml
          flags: unittests
          name: prometheus-proxy
          fail_ci_if_error: false
