name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v5

      - name: Compile (no tests)
        run: ./gradlew clean build -xtest

      - name: Lint
        run: ./gradlew lintKotlinMain lintKotlinTest

      # HARNESS_CONFIG is read by HarnessConstants in the forked test JVM, so it only takes effect
      # on this `test` step. The kover report tasks below consume the .exec files produced here
      # and do not re-run tests, so they don't need the env var.
      - name: Run tests
        env:
          HARNESS_CONFIG: MINI
        run: ./gradlew test

      - name: Generate coverage report
        if: always()
        run: ./gradlew koverXmlReport koverLog

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml
          flags: unittests
          name: prometheus-proxy
          fail_ci_if_error: false
