name: Documentation
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build the docs site + KDocs and upload the Pages artifact. Kept separate from
  # the deploy job so that recovering a failed deploy means re-running only the
  # deploy job (via "Re-run failed jobs"), which does NOT re-upload the artifact.
  # actions/deploy-pages hard-fails when a run contains more than one artifact
  # named "github-pages", which is what re-running a combined build+deploy job did.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5

      # Build Zensical documentation site
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      # Pinned for reproducible doc builds; bump deliberately when upgrading the toolchain.
      - run: pip install zensical==0.0.45 mkdocs-material==9.7.6
      - run: zensical build --clean
        working-directory: website/prometheus-proxy

      # Build KDoc API documentation
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew dokkaGeneratePublicationHtml

      # Copy KDocs into the Zensical site output
      - run: cp -r build/dokka/html website/prometheus-proxy/site/kdocs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: website/prometheus-proxy/site

  # Deploy the artifact produced by the build job. Deliberately minimal (no
  # checkout or build) so re-running just this job re-deploys the existing
  # artifact without rebuilding or re-uploading it.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
