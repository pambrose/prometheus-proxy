proxy {
  http {}

  ui {}

  agent {}

  auth = []

  admin {}

  metrics {
    grpc {}
  }

  internal {
    zipkin {}
    blitz {}
  }
}

agent {
  // endpoints must be defaulted here: tscfg generates an unguarded c.getList("endpoints"), so a config
  // that omits it (i.e. every config written before failover existed) would throw ConfigException.Missing.
  proxy { endpoints = [] }

  http {}

  admin {}

  metrics {
    grpc {}
  }

  pathConfigs: []

  filters: []

  internal {
    zipkin {}
  }
}