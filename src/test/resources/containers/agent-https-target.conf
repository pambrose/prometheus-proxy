agent {
  name = "test-agent"

  proxy {
    hostname = "proxy-host"
    port = 50051
  }

  pathConfigs: [
    {
      name: "HTTPS target"
      path: https_metrics
      // Host matches a SAN entry in testing/certs/server1.pem so hostname verification passes;
      // trust-all controls only whether the (untrusted) CA chain is accepted.
      url: "https://waterzooi.test.google.be/metrics"
    }
  ]

  scrapeTimeoutSecs = 5

  internal {
    reconnectPauseSecs = 1
  }
}
