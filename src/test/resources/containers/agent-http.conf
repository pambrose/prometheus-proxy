agent {
  name = "test-agent"

  proxy {
    hostname = "proxy-host"
    port = 50051
  }

  pathConfigs: [
    {
      name: "Test metrics"
      path: test_metrics
      url: "http://metrics-stub/metrics"
    }
    {
      name: "Test metrics 2"
      path: test_metrics2
      url: "http://metrics-stub/metrics2"
    }
    {
      name: "Missing target"
      path: missing_target
      url: "http://metrics-stub/missing"
    }
    {
      name: "Bad target"
      path: bad_target
      url: "http://unreachable-host:9999/metrics"
    }
  ]

  scrapeTimeoutSecs = 5

  internal {
    reconnectPauseSecs = 1
  }
}
