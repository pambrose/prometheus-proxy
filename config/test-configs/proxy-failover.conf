// Config for AgentProxyFailoverTest (Feature 2, Phase 1).
//
// The path is declared in pathConfigs rather than registered dynamically by the test on purpose: a
// runtime registration does not survive a reconnect (pathManager.clear() wipes it and registerPaths()
// only replays config-driven entries), so only a config-driven path proves that the agent re-registers
// on the endpoint it failed over TO.
//
// The stub URL port is fixed because a config file cannot see the test's dynamically-bound port.

agent {
  pathConfigs: [
    {
      name: failover
      path: failover_metrics
      url: "http://localhost:9534/metrics"
    }]

  internal {
    // Keep failover quick: a dropped connection costs one wasted attempt on the primary (the deliberate
    // failback re-probe) before the cursor advances, so the pause is paid twice per failover.
    reconnectPauseSecs = 1
  }
}
