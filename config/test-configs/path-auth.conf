// Config for AgentPathAuthTest: two per-agent identities, each constrained to its own path prefix.
// Shared by the proxy (reads proxy.auth) and the agent (reads agent.pathConfigs), like harness.conf.

proxy {
  auth = [
    { name = team_a, token = "team-a-token", paths = ["team_a_*"] }
    { name = team_b, token = "team-b-token", paths = ["team_b_*"] }
  ]
}

agent {
  // Empty so the agent auto-registers nothing; AgentPathAuthTest drives registration explicitly.
  pathConfigs = []
}
