// Config for ProxyWebUiTest (Feature 5). The agent name is asserted on in the pushed fragment, so it
// must be distinctive enough not to collide with anything else the page renders.

agent {
  name = "web-ui-agent"
  pathConfigs = []

  internal {
    reconnectPauseSecs = 1
  }
}

proxy {
  ui {
    // Short so the timer-driven half of the push loop is observable within a test's patience.
    refreshIntervalSecs = 1
  }
}
