// Config for AgentOptionsTest's endpoint-resolution cases. Exercises the agent.proxy.endpoints
// fallback path, which is only reachable when neither --proxy nor PROXY_HOSTNAME is set -- every other
// test supplies --proxy, so without this file that whole resolution block goes untested.
//
// The IPv6 entry is deliberate: endpoints are normalized by rendering each parsed HostPort back to a
// string and re-parsing it, and a naive "$host:$port" render drops the brackets an IPv6 literal needs,
// so the re-parse silently yields the wrong host and port.

agent {
  proxy {
    // Non-default, so it is visible whether it is honored as the per-entry default port.
    port = 50052
    endpoints = [
      "proxy-a",
      "proxy-b:50443",
      "[2001:db8::1]:50444",
    ]
  }

  pathConfigs = []
}
